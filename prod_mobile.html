<!DOCTYPE html>
<html>
<head>
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>External Agent</title>


  
</head>
<body style="background:beige">
    
<script src="https://hertz-chat.wonderfulgreece.org/embed.js"
  data-agent-id="5d17df22-2c2b-44dc-b0b5-8c6d2232d4bc"
  data-mobile="true"
  >
</script>
<script>
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'chat-session' && e.data.sessionId) {
      // Εδώ το κάνεις ό,τι θες
      console.log('Session ID:', e.data.sessionId);
      
    }
  });
  setTimeout(function () {document.getElementById("chat-toggle").click();}, 1000);
  
</script>    
</body>
</html>
